<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f5f5f5;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }
    
    .header h1 {
      font-size: 16px;
      color: #333;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
    
    .status-dot.active {
      background: #4CAF50;
      box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
    }
    
    .status-text {
      flex: 1;
      color: #666;
    }
    
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    .toggle input:checked + .toggle-slider {
      background-color: #4CAF50;
    }
    
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    
    .section {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .section h2 {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      font-weight: normal;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      color: #666;
    }
    
    .info-value {
      color: #333;
      font-weight: 500;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 8px;
      transition: background 0.2s;
    }
    
    .btn-primary {
      background: #2196F3;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1976D2;
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .debug-panel {
      display: none;
      margin-top: 12px;
    }
    
    .debug-panel.show {
      display: block;
    }
    
    .debug-output {
      background: #1e1e1e;
      color: #0f0;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    .footer {
      text-align: center;
      color: #999;
      font-size: 11px;
      margin-top: 12px;
    }
    
    .footer a {
      color: #2196F3;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 24px;">🎬</span>
    <h1>视频自动下一集</h1>
  </div>
  
  <div class="status">
    <div class="status-dot active" id="statusDot"></div>
    <span class="status-text" id="statusText">插件运行中</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="section">
    <h2>状态信息</h2>
    <div class="info-row">
      <span class="info-label">视频状态</span>
      <span class="info-value" id="videoStatus">检测中...</span>
    </div>
    <div class="info-row">
      <span class="info-label">下一集按钮</span>
      <span class="info-value" id="nextBtnStatus">未找到</span>
    </div>
    <div class="info-row">
      <span class="info-label">剩余时间</span>
      <span class="info-value" id="remainingTime">--:--</span>
    </div>
  </div>
  
  <button class="btn btn-primary" id="debugBtn">🔍 调试模式</button>
  
  <div class="debug-panel" id="debugPanel">
    <button class="btn btn-secondary" id="listBtnsBtn">列出所有按钮</button>
    <button class="btn btn-secondary" id="listCoursesBtn">列出课程列表</button>
    <button class="btn btn-secondary" id="testNextBtn">测试下一集跳转</button>
    <div class="debug-output" id="debugOutput">调试输出将显示在这里...</div>
  </div>
  
  <div class="footer">
    在控制台输入 <code>autoNextVideo</code> 查看更多调试选项
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
